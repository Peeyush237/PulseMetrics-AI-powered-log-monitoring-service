name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff mypy
      - run: ruff check app/ tests/ agent/pulsemetrics_agent/
      - run: mypy app/ --ignore-missing-imports

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: pulsemetrics
          POSTGRES_PASSWORD: pulsemetrics
          POSTGRES_DB: pulsemetrics
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql+asyncpg://pulsemetrics:pulsemetrics@localhost:5432/pulsemetrics
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/1
      JWT_SECRET: test-secret-key-not-for-production
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run migrations
        run: alembic upgrade head
      - name: Run unit tests
        run: pytest tests/unit/ -v --no-header
      - name: Run integration tests
        run: pytest tests/integration/ -v --no-header
