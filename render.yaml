services:
  # ── API (the main web service + dashboard) ──────────────────────────────────
  - type: web
    name: pulsemetrics-api
    runtime: python
    plan: free
    buildCommand: pip install -e ".[dev]"
    startCommand: bash start.sh
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pulsemetrics-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: pulsemetrics-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: pulsemetrics-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: pulsemetrics-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOW_ALL
        value: "true"
      - key: LOG_LEVEL
        value: INFO
      - key: EMBEDDING_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2

  # ── Celery Worker (processes log batches and sends notifications) ────────────
  - type: worker
    name: pulsemetrics-worker
    runtime: python
    plan: free
    buildCommand: pip install -e ".[dev]"
    startCommand: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pulsemetrics-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: pulsemetrics-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: pulsemetrics-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: pulsemetrics-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: EMBEDDING_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2

  # ── Celery Beat (fires rule evaluation every 30 seconds) ────────────────────
  - type: worker
    name: pulsemetrics-beat
    runtime: python
    plan: free
    buildCommand: pip install -e ".[dev]"
    startCommand: celery -A app.tasks.celery_app beat --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pulsemetrics-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: pulsemetrics-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: pulsemetrics-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: pulsemetrics-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        sync: false

databases:
  - name: pulsemetrics-db
    plan: free
    databaseName: pulsemetrics
    user: pulsemetrics

# NOTE: Render's free Redis is available via the dashboard.
# Add it manually: Dashboard → New → Redis → name it "pulsemetrics-redis"
